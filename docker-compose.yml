services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_server
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=niraj
      - MONGO_INITDB_ROOT_PASSWORD=macbookair13
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_gui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ADMINUSERNAME=niraj
      - ME_CONFIG_MONGODB_ADMINPASSWORD=macbookair13 # <--- Fixed the typo here
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin # <--- Added this line
    depends_on:
      - mongodb

volumes:
  mongo_data:
